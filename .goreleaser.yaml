version: 2
project_name: qmd
before:
  hooks:
    - go mod tidy
builds:
  - main: ./cmd/qmd/
    binary: qmd
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - format: tar.gz
    name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
checksum:
  name_template: checksums.txt
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
brews:
  - repository:
      owner: user
      name: homebrew-tap
    homepage: https://github.com/user/qmd-go
    description: Semantic search over markdown notes
    license: MIT
    install: |
      bin.install "qmd"
release:
  github:
    owner: user
    name: qmd-go
